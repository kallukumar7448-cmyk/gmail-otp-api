<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white; padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%; max-width: 420px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; color: #555; font-weight: 500; }
        input {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 1rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #667eea; }
        input:disabled { background: #f5f5f5; }
        .otp-input { letter-spacing: 8px; font-size: 1.5rem; text-align: center; }
        .btn {
            width: 100%; padding: 0.8rem; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
        .btn-danger { background: #e53e3e; color: white; }
        .btn-danger:hover { background: #c53030; }
        .btn-secondary { background: #718096; color: white; }
        .btn-secondary:hover { background: #4a5568; }
        .msg {
            margin-top: 1rem; padding: 0.8rem; border-radius: 8px;
            text-align: center; display: none;
        }
        .msg.success { display: block; background: #c6f6d5; color: #22543d; }
        .msg.error { display: block; background: #fed7d7; color: #822727; }
        .hidden { display: none; }
        .info { font-size: 0.85rem; color: #666; text-align: center; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📧 OTP Verification</h1>
        <p class="subtitle">Enter your email to receive a verification code</p>

        <!-- Step 1: Email Input -->
        <div id="step1">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autofocus>
            </div>
            <button class="btn btn-primary" id="sendBtn" onclick="sendOTP()">Send OTP</button>
        </div>

        <!-- Step 2: OTP Input -->
        <div id="step2" class="hidden">
            <div class="form-group">
                <label>OTP sent to <span id="displayEmail" style="font-weight:600;color:#667eea;"></span></label>
                <input type="text" class="otp-input" id="otp" placeholder="------" maxlength="6" inputmode="numeric" pattern="[0-9]*">
            </div>
            <button class="btn btn-primary" id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>
            <button class="btn btn-secondary" onclick="resetForm()" style="margin-top:0.5rem;">Change Email</button>
            <p class="info">OTP expires in <span id="timer">5:00</span></p>
        </div>

        <!-- Step 3: Success -->
        <div id="step3" class="hidden" style="text-align:center;">
            <div style="font-size:4rem;margin:1rem 0;">✅</div>
            <h2 style="color:#22543d;">Verified!</h2>
            <p style="color:#666;margin:0.5rem 0;">Your email has been verified successfully.</p>
            <button class="btn btn-primary" onclick="resetForm()">Verify Another</button>
        </div>

        <!-- Message -->
        <div id="msg" class="msg"></div>
    </div>

    <script>
        // Detect base URL automatically
        const API = window.location.origin + '/api';

        let timerInterval = null;

        async function sendOTP() {
            const email = document.getElementById('email').value.trim();
            if (!email) return showMsg('Please enter a valid email', 'error');

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch(`${API}/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('displayEmail').textContent = email;
                    showMsg(data.message, 'success');
                    startTimer(5 * 60);
                } else {
                    showMsg(data.message, 'error');
                }
            } catch (err) {
                showMsg('Server error. Please try again.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Send OTP';
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value.trim();
            const otp = document.getElementById('otp').value.trim();

            if (!otp || otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                return showMsg('Please enter a valid 6-digit OTP', 'error');
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const res = await fetch(`${API}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (data.success) {
                    clearInterval(timerInterval);
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    showMsg('', '');
                } else {
                    showMsg(data.message + (data.remaining ? ` (${data.remaining} attempts left)` : ''), 'error');
                }
            } catch (err) {
                showMsg('Verification failed. Try again.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Verify OTP';
        }

        function showMsg(message, type) {
            const el = document.getElementById('msg');
            el.textContent = message;
            el.className = 'msg' + (type ? ' ' + type : '');
        }

        function resetForm() {
            clearInterval(timerInterval);
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('otp').value = '';
            document.getElementById('email').value = '';
            document.getElementById('email').focus();
            showMsg('', '');
        }

        function startTimer(duration) {
            const timerEl = document.getElementById('timer');
            let time = duration;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const min = Math.floor(time / 60);
                const sec = time % 60;
                timerEl.textContent = `${min}:${sec.toString().padStart(2, '0')}`;

                if (time <= 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = 'Expired';
                    showMsg('OTP expired. Please request a new one.', 'error');
                }
                time--;
            }, 1000);
        }

        // Allow Enter key to submit
        document.getElementById('email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendOTP();
        });
        document.getElementById('otp').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyOTP();
        });
    </script>
</body>
</html>
